name: CI

on:
  push:
  pull_request:

env:
  GHC_VERSION: "9.10.1"
  CABAL_VERSION: "3.12.1.0"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up GHC and Cabal
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ env.GHC_VERSION }}
          cabal-version: ${{ env.CABAL_VERSION }}

      - name: Cache Cabal store and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/packages
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-ghc-${{ env.GHC_VERSION }}-cabal-${{ hashFiles('**/*.cabal', 'cabal.project', 'cabal.project.freeze') }}
          restore-keys: |
            ${{ runner.os }}-ghc-${{ env.GHC_VERSION }}-cabal-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make z3

      - name: Update Cabal package index
        run: cabal update

      - name: Run test suite
        run: cabal test --test-show-details=direct
