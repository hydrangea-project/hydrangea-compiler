name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up GHC and Cabal
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.4.8"
          cabal-version: "3.10"

      - name: Cache Cabal store and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/packages
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-ghc-9.4.8-cabal-${{ hashFiles('**/*.cabal', 'cabal.project', 'cabal.project.freeze') }}
          restore-keys: |
            ${{ runner.os }}-ghc-9.4.8-cabal-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make z3

      - name: Update Cabal package index
        run: cabal update

      - name: Run test suite
        run: cabal test --test-show-details=direct
